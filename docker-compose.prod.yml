# ============================================================
# Docker Compose — Syndra (Producción con Traefik)
# Desplegar en /opt/syndra/
# docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  # ---- PostgreSQL 16 ----
  db:
    image: postgres:16-alpine
    container_name: syndra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-syndra}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Solo accesible desde localhost del servidor (para túnel SSH)
    ports:
      - "127.0.0.1:5433:5432"

  # ---- API (NestJS) ----
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: syndra-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - traefik-public
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-syndra}

      # LLM
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o}

      # Image generation
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY:-}
      IMAGE_GEN_PROVIDER: ${IMAGE_GEN_PROVIDER:-mock}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # Meta (Instagram / Facebook)
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_IG_USER_ID: ${META_IG_USER_ID:-}
      META_FB_PAGE_ID: ${META_FB_PAGE_ID:-}

      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}

      # HeyGen (Video/Avatar)
      HEYGEN_API_KEY: ${HEYGEN_API_KEY:-}
      HEYGEN_AVATAR_ID: ${HEYGEN_AVATAR_ID:-}
      HEYGEN_VOICE_ID: ${HEYGEN_VOICE_ID:-}

      # ElevenLabs (Voice)
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}

      # Public URL (para links, webhooks, etc.)
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://syndra.aivanguardlabs.com/api}

    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      # Router para el API — path /api
      - "traefik.http.routers.syndra-api.rule=Host(`syndra.aivanguardlabs.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.syndra-api.entrypoints=websecure"
      - "traefik.http.routers.syndra-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.syndra-api.priority=20"
      - "traefik.http.services.syndra-api.loadbalancer.server.port=3001"

  # ---- Web (Next.js) ----
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://syndra.aivanguardlabs.com/api
    container_name: syndra-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - traefik-public
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: "0.0.0.0"
      API_URL: http://api:3001
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: https://syndra.aivanguardlabs.com/api
      NEXT_PUBLIC_URL: https://syndra.aivanguardlabs.com
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-syndra}

      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      # Router para el frontend — catch-all del dominio
      - "traefik.http.routers.syndra-web.rule=Host(`syndra.aivanguardlabs.com`)"
      - "traefik.http.routers.syndra-web.entrypoints=websecure"
      - "traefik.http.routers.syndra-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.syndra-web.priority=10"
      - "traefik.http.services.syndra-web.loadbalancer.server.port=3002"
      # Router para Next.js API routes (Meta OAuth) — prioridad mayor que NestJS API
      - "traefik.http.routers.syndra-web-api.rule=Host(`syndra.aivanguardlabs.com`) && PathPrefix(`/api/auth/meta`)"
      - "traefik.http.routers.syndra-web-api.entrypoints=websecure"
      - "traefik.http.routers.syndra-web-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.syndra-web-api.priority=30"
      - "traefik.http.routers.syndra-web-api.service=syndra-web"

volumes:
  pgdata:
    driver: local

networks:
  internal:
    # Red interna — solo los servicios de Syndra se ven entre sí
    driver: bridge
  traefik-public:
    external: true
